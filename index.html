<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Quieres ser mi Valentín? 💌</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><text y=%2226%22 font-size=%2226%22>💗</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="hearts-bg" id="heartsBg" aria-hidden="true"></div>
  <canvas id="confettiCanvas" aria-hidden="true"></canvas>
  <div class="si-swarm" id="siSwarm"></div>

  <main class="stage">

    <button class="envelope-wrap" id="envelopeBtn" type="button" aria-label="Abrir la carta">
      <span class="envelope">
        <span class="envelope-pocket"></span>
        <span class="envelope-letter-peek"></span>
        <span class="envelope-flap"></span>
        <span class="envelope-seal">💗</span>
      </span>
      <span class="envelope-caption">Toca para abrir</span>
    </button>

    <section class="card" id="card" hidden>
      <img class="letter-sticker" src="img/emoji.png" alt="" />
      <p class="eyebrow">alerta de pregunta importante</p>
      <h1 class="question">¿Quieres ser<br />mi Valentín?</h1>
      <p class="subtext">Sé que no tienes planes para San Valentín, así que vamos a comer algo rico juntos 🍝💕</p>

      <div class="buttons">
        <button class="heart-btn heart-yes si-heart" id="yesBtn" type="button" aria-label="Sí, quiero">💖</button>
        <button class="heart-btn heart-no" id="noBtn" type="button" aria-label="No">💔</button>
      </div>

      <p class="hint" id="hint">&nbsp;</p>
    </section>

    <section class="card celebrate" id="celebrateScreen" hidden>
      <div class="big-heart">💘</div>
      <h2 class="celebrate-title">¡Ya sabía que sí!</h2>
      <p class="celebrate-text">Sabía que ibas a decir que sí. Nos vemos pronto para comer algo rico 🎉</p>
      <a class="whatsapp-btn" id="whatsappBtn" href="https://wa.me/67676767" target="_blank" rel="noopener">
        Llámame bb 💗
      </a>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
